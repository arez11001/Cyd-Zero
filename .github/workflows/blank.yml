name: Build CYD Zero

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          mkdir -p $HOME/bin
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure and install ESP32
        run: |
          $HOME/bin/arduino-cli config init
          $HOME/bin/arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          $HOME/bin/arduino-cli core update-index
          $HOME/bin/arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries
        run: |
          $HOME/bin/arduino-cli lib install "TFT_eSPI"
          $HOME/bin/arduino-cli lib install "XPT2046_Touchscreen"

      - name: Patch TFT_eSPI User_Setup.h
        run: |
          cat > $HOME/Arduino/libraries/TFT_eSPI/User_Setup.h << 'EOF'
          #define ILI9341_DRIVER
          #define TFT_MISO 12
          #define TFT_MOSI 13
          #define TFT_SCLK 14
          #define TFT_CS   15
          #define TFT_DC    2
          #define TFT_RST  -1
          #define TFT_BL   21
          #define TFT_BACKLIGHT_ON HIGH
          #define LOAD_GLCD
          #define LOAD_FONT2
          #define LOAD_FONT4
          #define SMOOTH_FONT
          #define SPI_FREQUENCY  40000000
          #define SPI_TOUCH_FREQUENCY 2500000
          EOF

      - name: Compile sketch
        run: |
          $HOME/bin/arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            CYD_FlipperUI.ino

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: CYD-Zero-firmware
          path: ./build/*.bin
